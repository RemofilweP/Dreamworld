<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YamSwag</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
    <section id="header">
        <a href="index.html">
            <img src="DreamWorld/DreamLogo.png" class="logo" alt="logo"> 
        </a>

        <!-- Burger icon -->
        <div id="mobile">
            <a href="cart.html" class="cart-link">
            <i class="fa-solid fa-cart-shopping"></i>
            <span id="cart-count">0</span>
            </a>
            <i id="bar" class="fa-solid fa-bars"></i>
        </div>

        <!-- Navigation -->
        <ul id="navbar">
            <li> <a href="index.html">Home</a> </li>
            <li> <a href="shop.html">Shop</a> </li>
            <li> <a class="active" href="contact.html">Contact</a> </li>
            <li> <a href="cart.html" class="cart-link">
                <i class="fa-solid fa-cart-shopping"></i>
                <span class="cart-count" id="cart-count">0</span>
                </a>
            </li>
        </ul>
    </section>

    <section id="contact" class="section-p1">
        <h2>Contact Us</h2>
        <p>Have a question or issue? Send us a message 👇</p>

        <form action="https://formspree.io/f/your-form-id" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" rows="5" placeholder="Your Message" required></textarea>

            <button type="submit">Send Message</button>
        </form>
    </section>

    <section id="socials">
        <h3>Follow Us</h3>

        <div class="social-links">
            <a href="https://instagram.com/yourbrand" target="_blank">Instagram</a>
            <a href="https://twitter.com/yourbrand" target="_blank">Twitter</a>
            <a href="https://tiktok.com/@yourbrand" target="_blank">TikTok</a>
        </div>
    </section>

    
    <script src="script.js"> </script>
</body>

</html>
